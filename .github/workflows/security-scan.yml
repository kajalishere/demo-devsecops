name: Security Scanning Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety pytest
        
    - name: Run Bandit SAST Scan
      continue-on-error: true
      run: |
        echo "=== Running Bandit Static Application Security Testing ==="
        bandit -r app/ -f json -o bandit-report.json
        bandit -r app/ -f txt
        
    - name: Upload Bandit Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json
        
    - name: Run Safety Dependency Check
      continue-on-error: true
      run: |
        echo "=== Running Safety Dependency Vulnerability Check ==="
        safety check --json > safety-report.json
        safety check

    - name: Generate PDF Report
      if: always()
      continue-on-error: true
      run: |
        echo "=== Generating PDF Security Report ==="
        python generate_report.py
        
    - name: Upload Safety Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: safety-report
        path: safety-report.json

    - name: Upload PDF Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-pdf-report
        path: security_report.pdf
        
    - name: Run Unit Tests
      continue-on-error: true
      run: |
        echo "=== Running Unit Tests ==="
        pytest tests/ -v --tb=short || true
        
    - name: Security Scan Summary
      if: always()
      run: |
        echo ""
        echo "========== SECURITY SCAN SUMMARY =========="
        echo ""
        echo "✓ Bandit SAST Scan: Complete"
        echo "✓ Safety Dependency Check: Complete"
        echo "✓ Unit Tests: Complete"
        echo ""
        echo "Reports available in Actions artifacts:"
        echo "  - bandit-report.json"
        echo "  - safety-report.json"
        echo ""
        echo "For detailed results, download artifacts or check logs above."
        echo "=========================================="
