name: Security Scanning Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Safety Dependency Check
      continue-on-error: true
      run: |
        echo "=== Running Safety Dependency Scan ==="
        safety check --json > safety-report.json 2>&1 || true
        safety check || true
        
    - name: Generate PDF Report
      continue-on-error: true
      run: |
        echo "=== Generating PDF Report ==="
        python generate_report.py || true
        
    - name: Upload Safety Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: safety-report
        path: safety-report.json
        if-no-files-found: ignore
        
    - name: Upload PDF Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-pdf-report
        path: security_report.pdf
        if-no-files-found: ignore
        
    - name: Run Tests
      continue-on-error: true
      run: |
        echo "=== Running Unit Tests ==="
        pytest tests/ -v --tb=short 2>&1 || true
        
    - name: Security Scan Complete
      if: always()
      run: |
        echo ""
        echo "✅ Security Scanning Complete"
        echo "Reports available in artifacts:"
        echo "  - safety-report.json"
        echo "  - security_report.pdf"
        echo ""
